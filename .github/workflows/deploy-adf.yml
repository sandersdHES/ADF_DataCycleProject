name: Deploy ADF

# Deploys the ADF source JSON in adf/ to the existing factory. Infrastructure is
# assumed to already exist (provisioned manually / via subscription transfer) —
# this workflow is the day-to-day CI/CD path for pipeline + linked service changes.
#
# Requires GitHub Environment 'prod' with:
#   - AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID (OIDC federated identity)
#   - AZURE_RESOURCE_GROUP (variable) — the RG containing the factory
#   - AZURE_ADF_NAME       (variable) — the factory name, e.g. group3-df

on:
  push:
    branches: [main]
    paths:
      - 'adf/**'
      - 'sql/**'
      - '.github/workflows/deploy-adf.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-adf
  cancel-in-progress: false

jobs:
  deploy:
    name: Export + deploy ADF ARM
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      # enable-AzPSSession is required because data-factory-deploy-action uses
      # Az PowerShell cmdlets (Get-AzDataFactoryV2Trigger, etc.), which need
      # their own Connect-AzAccount — the CLI session alone is not enough.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      # Builds ARMTemplateForFactory.json from adf/ source — no adf_publish branch needed.
      # Path is relative because the action runs inside a Docker container where the
      # repo is mounted at /github/workspace — an absolute host path breaks the mount.
      # Output lands in an `armTemplate/` subdirectory under the given path.
      - name: Export ADF ARM from source
        id: export
        uses: Azure/data-factory-export-action@v1.2.1
        with:
          path: ./adf
          id: /subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ vars.AZURE_RESOURCE_GROUP }}/providers/Microsoft.DataFactory/factories/${{ vars.AZURE_ADF_NAME }}

      # Stops triggers, deploys the linked-template master with SAS staging, restarts triggers.
      - name: Deploy ADF
        uses: Azure/data-factory-deploy-action@v1.2.0
        with:
          resourceGroupName: ${{ vars.AZURE_RESOURCE_GROUP }}
          dataFactoryName: ${{ vars.AZURE_ADF_NAME }}
          armTemplateFile: ${{ steps.export.outputs.arm-template-directory }}/ARMTemplateForFactory.json
          armTemplateParametersFile: ${{ steps.export.outputs.arm-template-directory }}/ARMTemplateParametersForFactory.json
          additionalParameters: >-
            factoryName=${{ vars.AZURE_ADF_NAME }}

  deploy-sql:
    name: Deploy SQL schema and security
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SQL password from Key Vault
        id: sql-pwd
        run: |
          pwd=$(az keyvault secret show \
            --vault-name DataCycleGroup3Keys \
            --name Admin-SQL-Password \
            --query value -o tsv)
          echo "::add-mask::$pwd"
          echo "value=$pwd" >> "$GITHUB_OUTPUT"

      # sqlcmd is pre-installed on ubuntu-latest (mssql-tools).
      # -b  abort batch on first error
      # -l  login timeout (seconds) — serverless DB may need up to 60 s to resume
      # deploy_schema.sql runs first; deploy_security.sql depends on the tables it creates.
      - name: Deploy deploy_schema.sql
        run: |
          for i in 1 2 3; do
            sqlcmd \
              -S sqlserver-bellevue-grp3.database.windows.net,1433 \
              -d DevDB \
              -U "dylan.sanderso@sqlserver-bellevue-grp3" \
              -P "${{ steps.sql-pwd.outputs.value }}" \
              -i sql/deploy_schema.sql \
              -b -l 60 && break
            echo "Attempt $i failed (serverless resume?), retrying in 60s..."
            sleep 60
          done

      - name: Deploy deploy_security.sql
        run: |
          sqlcmd \
            -S sqlserver-bellevue-grp3.database.windows.net,1433 \
            -d DevDB \
            -U "dylan.sanderso@sqlserver-bellevue-grp3" \
            -P "${{ steps.sql-pwd.outputs.value }}" \
            -v SQL_USER_PASSWORD="${{ steps.sql-pwd.outputs.value }}" \
            -i sql/deploy_security.sql \
            -b -l 60
